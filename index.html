<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>wishba graphic design</title>
<style>
  .title {
    text-align: center;
  }

  .image-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    max-width: 50rem;
    margin: auto;
  }

  .image-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .image-list img {
    width: 100%;
    border: 1px solid black;
    border-radius: 1rem;
  }

  @media (prefers-color-scheme:dark) {
    .image-list img {
      border: 1px solid white;
    }
  }
</style>
</head>

<body>
  <header class="title">
    <h1>Wisnu Bayu Graphic Design Works</h1>
    <h2>
      Email: <a href="https://mail.google.com/mail/?view=cm&to=u2pbdrhi5@mozmail.com" target="_blank"
        rel="noopener noreferrer">u2pbdrhi5@mozmail.com</a>
    </h2>
    <h2>
      Website: <a href="http://wishba.github.io" target="_blank" rel="noopener noreferrer">wishba.github.io</a>
    </h2>
  </header>

  <section class="image-grid">
    <div class="image-list">
      <img src="assets/lapangan nolnam.png" alt="lapangan nolnam">
      <img src="assets/lomba qosidah.png" alt="lomba qosidah">
      <img src="assets/papan nama daarul.png" alt="papan nama daarul">
      <img src="assets/perhatian cctv.png" alt="perhatian cctv">
      <img src="assets/ppdb daarul 2025-2026.png" alt="ppdb daarul 2025-2026">
    </div>

    <div class="image-list">
      <img src="assets/tabligh akbar 5 desember 2024 landscape.png" alt="tabligh akbar 5 desember 2024 landscape">
      <img src="assets/tabligh akbar 5 desember 2024.png" alt="tabligh akbar 5 desember 2024">
      <img src="assets/wisput logo.png" alt="wisput logo">
      <img src="assets/penutupan tahun ajaran 2024 - 2025.png" alt="daarul penutupan tahun ajaran baru">
    </div>
  </section>

  <div id="imgModal"
    style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
    <span id="closeModal"
      style="position:absolute; top:2rem; right:2rem; color:white; font-size:2rem; cursor:pointer;">&times;</span>
    <img id="modalImg" src="" alt=""
      style="max-width:90vw; max-height:90vh; border-radius:1rem; box-shadow:0 0 2rem #000;">
  </div>

  <script>
    document.querySelectorAll('.image-list img').forEach(img => {
      img.addEventListener('click', function () {
        document.getElementById('modalImg').src = this.src;
        document.getElementById('modalImg').alt = this.alt;
        document.getElementById('imgModal').style.display = 'flex';
      });
    });

    document.getElementById('closeModal').onclick = function () {
      document.getElementById('imgModal').style.display = 'none';
    };
    document.getElementById('imgModal').onclick = function (e) {
      if (e.target === this) this.style.display = 'none';
    };
  </script>
</body>

</html>
